<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Two Machines One Jar Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff3fa4;
    --purple: #9b3ff2;
    --teal: #00e0c6;
    --yellow: #ffe14d;
    --orange: #ff8a3d;
    --blue: #3fc6ff;
    --ink: #3a1560;
    --card: #fffdf8;
    --font-display: 'Baloo 2', system-ui, sans-serif;
    --font-body: 'Nunito', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    margin: 0;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: var(--font-body);
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 28px 16px calc(40px + env(safe-area-inset-bottom));
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
    background: radial-gradient(circle at 15% 10%, #fff6a8 0%, transparent 40%),
                radial-gradient(circle at 90% 15%, #7de8ff 0%, transparent 45%),
                radial-gradient(circle at 85% 90%, #ff9fe0 0%, transparent 45%),
                radial-gradient(circle at 10% 85%, #b98bff 0%, transparent 45%),
                linear-gradient(135deg, #ff3fa4, #9b3ff2 35%, #3fc6ff 70%, #00e0c6);
    background-attachment: fixed;
  }

  .sheet { width: 100%; max-width: 480px; }

  @media (max-width: 400px) {
    body { padding-top: 18px; }
    h1 { font-size: 26px !important; }
    .panel { padding: 16px !important; }
    .readout .value { font-size: 19px !important; }
  }

  header {
    text-align: center;
    margin-bottom: 20px;
  }

  h1 {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 30px;
    line-height: 1.15;
    color: #fff;
    text-shadow:
      2px 2px 0 var(--purple),
      -1px -1px 0 var(--pink),
      0 4px 14px rgba(0,0,0,0.25);
    letter-spacing: 0.01em;
  }

  .panel {
    background: var(--card);
    border: 4px solid var(--pink);
    border-radius: 24px;
    padding: 22px;
    margin-bottom: 18px;
    box-shadow: 8px 8px 0 rgba(0,0,0,0.12), 0 0 0 8px rgba(255,255,255,0.35) inset;
    position: relative;
  }
  .panel.results { border-color: var(--teal); }

  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    color: var(--purple);
    margin-bottom: 6px;
  }

  .input-row {
    display: flex;
    align-items: center;
    background: #fdf6ff;
    border: 3px solid var(--blue);
    border-radius: 14px;
    padding: 0 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-row:focus-within {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(255,138,61,0.25);
  }

  .input-row input {
    flex: 1;
    width: 100%;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: var(--font-body);
    font-weight: 800;
    font-size: 18px;
    padding: 13px 0;
  }
  .input-row input::placeholder { color: #c9b8e0; font-weight: 700; }

  .unit {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    color: var(--teal);
  }

  .readout {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 4px;
    border-bottom: 2px dashed #ffd6ef;
  }
  .readout:last-child { border-bottom: none; }

  .readout .label {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 15px;
    color: var(--purple);
  }

  .readout .value {
    font-family: var(--font-body);
    font-weight: 800;
    font-size: 21px;
    color: var(--pink);
  }
  .readout .value.negative { color: #ff2020; }

  .placeholder-note {
    color: #a98fc9;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 14px;
    padding: 4px 0;
    text-align: center;
  }

  button.reset {
    display: block;
    width: 100%;
    min-height: 48px;
    background: linear-gradient(90deg, var(--yellow), var(--orange));
    border: 3px solid #fff;
    color: #6b2b00;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 15px;
    padding: 10px 14px;
    border-radius: 16px;
    cursor: pointer;
    box-shadow: 5px 5px 0 rgba(0,0,0,0.15);
    -webkit-tap-highlight-color: transparent;
  }
  button.reset:active {
    transform: translate(2px, 2px);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.15);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useMemo } = React;
const PRECISION = 4;

function parseNum(v) {
  if (v === "" || v === null || v === undefined) return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

function fmt(n) {
  if (n === null) return "—";
  let s = n.toFixed(PRECISION);
  s = s.replace(/(\.\d{2}\d*?)0+$/, "$1").replace(/\.$/, "");
  return s + " g";
}

function Field({ label, value, onChange, placeholder }) {
  return (
    <div className="field">
      <label>{label}</label>
      <div className="input-row">
        <input
          type="number"
          inputMode="decimal"
          step="any"
          placeholder={placeholder}
          value={value}
          onChange={(e) => onChange(e.target.value)}
        />
        <span className="unit">g</span>
      </div>
    </div>
  );
}

function Readout({ label, value, negative }) {
  return (
    <div className="readout">
      <div className="label">{label}</div>
      <div className={"value" + (negative ? " negative" : "")}>{fmt(value)}</div>
    </div>
  );
}

function App() {
  const [bulk, setBulk] = useState("");
  const [full, setFull] = useState("");
  const [mid, setMid] = useState("");
  const [empty, setEmpty] = useState("");

  const b = parseNum(bulk);
  const j = parseNum(full);
  const s = parseNum(mid);
  const f = parseNum(empty);

  const results = useMemo(() => {
    if (b === null || j === null) return null;
    const tare = j - b;
    const pour1 = s !== null ? j - s : null;
    const pour2 = s !== null && f !== null ? s - f : null;
    const waste = f !== null ? f - tare : null;
    return { pour1, pour2, waste };
  }, [b, j, s, f]);

  function reset() {
    setBulk(""); setFull(""); setMid(""); setEmpty("");
  }

  return (
    <div className="sheet">
      <header>
        <h1>Two Machines One Jar Calculator</h1>
      </header>

      <div className="panel">
        <Field label="Bulk Weight:" value={bulk} onChange={setBulk} placeholder="0.0000" />
        <Field label="Jar + Spatula Weight (Full)" value={full} onChange={setFull} placeholder="0.0000" />
        <Field label="Jar + Spatula Weight (Intermediate)" value={mid} onChange={setMid} placeholder="0.0000" />
        <Field label="Jar + Spatula Weight (Empty)" value={empty} onChange={setEmpty} placeholder="0.0000" />
      </div>

      <div className="panel results">
        {!results && (
          <div className="placeholder-note">Enter Bulk Weight and Full Jar + Spatula Weight to begin.</div>
        )}
        {results && (
          <React.Fragment>
            <Readout label="Amount in Machine One:" value={results.pour1} negative={results.pour1 !== null && results.pour1 < 0} />
            <Readout label="Amount in Machine Two:" value={results.pour2} negative={results.pour2 !== null && results.pour2 < 0} />
            <Readout label="Jar Waste:" value={results.waste} negative={results.waste !== null && results.waste < 0} />
          </React.Fragment>
        )}
      </div>

      <button className="reset" onClick={reset}>Clear all fields</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
