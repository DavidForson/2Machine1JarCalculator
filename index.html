<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pour Split Calculator</title>
<style>
  :root {
    --bg: #17191b;
    --panel: #1f2225;
    --panel-line: #303539;
    --amber: #c98a2c;
    --amber-bright: #e3a83e;
    --lcd-bg: #14181a;
    --lcd-fg: #f2c66d;
    --text: #e8e6e1;
    --text-dim: #8b9096;
    --danger: #c2503f;
    --good: #6fa87a;
    --font-ui: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-mono: 'Consolas', 'SFMono-Regular', Menlo, monospace;
  }

  * { box-sizing: border-box; }

  html {
    -webkit-text-size-adjust: 100%;
  }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% -10%, rgba(201,138,44,0.08), transparent 45%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 32px 16px calc(48px + env(safe-area-inset-bottom));
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
  }

  .sheet {
    width: 100%;
    max-width: 480px;
  }

  @media (max-width: 400px) {
    body {
      padding-top: 20px;
      padding-bottom: calc(36px + env(safe-area-inset-bottom));
    }
    h1 { font-size: 20px; }
    .panel { padding: 16px; }
    .readout .value { font-size: 18px; }
    .readout.total .value { font-size: 20px; }
  }

  header {
    margin-bottom: 22px;
    border-bottom: 1px solid var(--panel-line);
    padding-bottom: 16px;
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--amber);
  }

  h1 {
    margin: 6px 0 4px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .sub {
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.5;
    max-width: 44ch;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .panel h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-dim);
    margin: 0 0 16px;
    font-weight: 600;
  }

  .field {
    margin-bottom: 14px;
  }
  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .field .hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .input-row {
    display: flex;
    align-items: center;
    background: var(--lcd-bg);
    border: 1px solid var(--panel-line);
    border-radius: 6px;
    padding: 0 12px;
    transition: border-color 0.15s;
  }
  .input-row:focus-within {
    border-color: var(--amber);
  }

  .input-row input {
    flex: 1;
    width: 100%;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    color: var(--lcd-fg);
    font-family: var(--font-mono);
    font-size: 17px;
    padding: 14px 0;
    letter-spacing: 0.02em;
    -moz-appearance: textfield;
  }
  .input-row input::-webkit-outer-spin-button,
  .input-row input::-webkit-inner-spin-button {
    margin-left: 8px;
  }
  .input-row input::placeholder {
    color: #4a4f45;
  }

  .unit {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
  }

  .readout {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 0;
    border-bottom: 1px dashed var(--panel-line);
  }
  .readout:last-child { border-bottom: none; }

  .readout .label {
    font-size: 13px;
    color: var(--text-dim);
  }
  .readout .label .tag {
    display: block;
    font-family: var(--font-mono);
    font-size: 10px;
    color: #5c6167;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .readout .value {
    font-family: var(--font-mono);
    font-size: 20px;
    color: var(--lcd-fg);
    font-variant-numeric: tabular-nums;
  }
  .readout .value.negative {
    color: var(--danger);
  }
  .readout.total .value {
    color: var(--amber-bright);
    font-size: 22px;
  }

  .check {
    margin-top: 14px;
    padding: 10px 12px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
  }
  .check.ok {
    background: rgba(111,168,122,0.1);
    color: var(--good);
    border: 1px solid rgba(111,168,122,0.25);
  }
  .check.warn {
    background: rgba(194,80,63,0.1);
    color: var(--danger);
    border: 1px solid rgba(194,80,63,0.25);
  }

  .placeholder-note {
    color: var(--text-dim);
    font-size: 13px;
    font-family: var(--font-mono);
    padding: 8px 0;
  }

  footer {
    text-align: center;
    color: #545a5f;
    font-size: 11px;
    margin-top: 24px;
    font-family: var(--font-mono);
  }

  button.reset {
    display: block;
    width: 100%;
    min-height: 44px;
    background: none;
    border: 1px solid var(--panel-line);
    color: var(--text-dim);
    font-family: var(--font-ui);
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 4px;
    -webkit-tap-highlight-color: transparent;
  }
  button.reset:hover,
  button.reset:active {
    border-color: var(--amber);
    color: var(--amber-bright);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useMemo } = React;

function parseNum(v) {
  if (v === "" || v === null || v === undefined) return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

function fmt(n) {
  if (n === null) return "—";
  return n.toFixed(2) + " g";
}

function Field({ label, hint, value, onChange, placeholder }) {
  return (
    <div className="field">
      <label>{label}</label>
      <div className="input-row">
        <input
          type="number"
          inputMode="decimal"
          step="0.01"
          placeholder={placeholder}
          value={value}
          onChange={(e) => onChange(e.target.value)}
        />
        <span className="unit">g</span>
      </div>
      {hint && <div className="hint">{hint}</div>}
    </div>
  );
}

function Readout({ label, tag, value, negative }) {
  return (
    <div className="readout">
      <div className="label">
        {label}
        {tag && <span className="tag">{tag}</span>}
      </div>
      <div className={"value" + (negative ? " negative" : "")}>{fmt(value)}</div>
    </div>
  );
}

function App() {
  const [bulk, setBulk] = useState("");
  const [js, setJs] = useState("");
  const [sjs, setSjs] = useState("");
  const [fjs, setFjs] = useState("");

  const b = parseNum(bulk);
  const j = parseNum(js);
  const s = parseNum(sjs);
  const f = parseNum(fjs);

  const results = useMemo(() => {
    if (b === null || j === null) return null;

    const tare = j - b;
    const pour1 = s !== null ? j - s : null;
    const pour2 = s !== null && f !== null ? s - f : null;
    const waste = f !== null ? f - tare : null;
    const total = pour1 !== null && pour2 !== null && waste !== null
      ? pour1 + pour2 + waste
      : null;
    const diff = total !== null ? total - b : null;

    return { tare, pour1, pour2, waste, total, diff };
  }, [b, j, s, f]);

  function reset() {
    setBulk(""); setJs(""); setSjs(""); setFjs("");
  }

  return (
    <div className="sheet">
      <header>
        <div className="eyebrow">Fill Line · Pour Log</div>
        <h1>Pour Split Calculator</h1>
        <p className="sub">
          Enter the four scale readings from a two-machine pour. Amount poured
          into each machine and leftover jar waste are computed automatically.
        </p>
      </header>

      <div className="panel">
        <h2>Scale Readings</h2>
        <Field
          label="Bulk weight"
          hint="Total product weight, jar empty of packaging"
          value={bulk}
          onChange={setBulk}
          placeholder="e.g. 850.00"
        />
        <Field
          label="Jar + spatula weight"
          hint="Full jar, before any pouring"
          value={js}
          onChange={setJs}
          placeholder="e.g. 920.50"
        />
        <Field
          label="Second jar + spatula weight"
          hint="After pouring into machine 1"
          value={sjs}
          onChange={setSjs}
          placeholder="e.g. 550.20"
        />
        <Field
          label="Final jar + spatula weight"
          hint="After pouring into machine 2"
          value={fjs}
          onChange={setFjs}
          placeholder="e.g. 180.75"
        />
      </div>

      <div className="panel">
        <h2>Results</h2>
        {!results && (
          <div className="placeholder-note">
            Enter at least Bulk weight and Jar + spatula weight to begin.
          </div>
        )}
        {results && (
          <React.Fragment>
            <Readout
              label="Tare (empty jar + spatula)"
              tag="JAR &amp; SPATULA − BULK"
              value={results.tare}
              negative={results.tare < 0}
            />
            <Readout
              label="Poured into machine 1"
              tag="JAR &amp; SPATULA − SECOND"
              value={results.pour1}
              negative={results.pour1 !== null && results.pour1 < 0}
            />
            <Readout
              label="Poured into machine 2"
              tag="SECOND − FINAL"
              value={results.pour2}
              negative={results.pour2 !== null && results.pour2 < 0}
            />
            <Readout
              label="Jar waste (unusable leftover)"
              tag="FINAL − TARE"
              value={results.waste}
              negative={results.waste !== null && results.waste < 0}
            />
            <div className="readout total">
              <div className="label">Accounted total</div>
              <div className="value">{fmt(results.total)}</div>
            </div>

            {results.total !== null && (
              Math.abs(results.diff) < 0.05 ? (
                <div className="check ok">
                  <span>✓ balances against bulk weight</span>
                  <span>{results.diff >= 0 ? "+" : ""}{results.diff.toFixed(2)} g</span>
                </div>
              ) : (
                <div className="check warn">
                  <span>⚠ off from bulk weight — re-check readings</span>
                  <span>{results.diff >= 0 ? "+" : ""}{results.diff.toFixed(2)} g</span>
                </div>
              )
            )}
          </React.Fragment>
        )}
      </div>

      <button className="reset" onClick={reset}>Clear all fields</button>

      <footer>tare, pour, waste — all in grams</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
