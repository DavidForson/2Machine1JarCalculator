<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Two Machines One Jar Calculator</title>
<style>
  :root {
    --bg: #17191b;
    --panel: #1f2225;
    --panel-line: #303539;
    --amber: #c98a2c;
    --amber-bright: #e3a83e;
    --lcd-bg: #14181a;
    --lcd-fg: #f2c66d;
    --text: #e8e6e1;
    --text-dim: #8b9096;
    --danger: #c2503f;
    --good: #6fa87a;
    --font-ui: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-mono: 'Consolas', 'SFMono-Regular', Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% -10%, rgba(201,138,44,0.08), transparent 45%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 28px 16px calc(40px + env(safe-area-inset-bottom));
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
  }

  .sheet { width: 100%; max-width: 480px; }

  @media (max-width: 400px) {
    body { padding-top: 18px; }
    h1 { font-size: 19px; }
    .panel { padding: 16px; }
    .readout .value { font-size: 18px; }
  }

  header {
    margin-bottom: 18px;
    border-bottom: 1px solid var(--panel-line);
    padding-bottom: 14px;
  }

  h1 {
    margin: 0;
    font-size: 21px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .input-row {
    display: flex;
    align-items: center;
    background: var(--lcd-bg);
    border: 1px solid var(--panel-line);
    border-radius: 6px;
    padding: 0 12px;
    transition: border-color 0.15s;
  }
  .input-row:focus-within { border-color: var(--amber); }

  .input-row input {
    flex: 1;
    width: 100%;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    color: var(--lcd-fg);
    font-family: var(--font-mono);
    font-size: 17px;
    padding: 14px 0;
    letter-spacing: 0.02em;
  }
  .input-row input::placeholder { color: #4a4f45; }

  .unit {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
  }

  .readout {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 0;
    border-bottom: 1px dashed var(--panel-line);
  }
  .readout:last-child { border-bottom: none; }

  .readout .label { font-size: 14px; color: var(--text); }

  .readout .value {
    font-family: var(--font-mono);
    font-size: 20px;
    color: var(--lcd-fg);
    font-variant-numeric: tabular-nums;
  }
  .readout .value.negative { color: var(--danger); }

  .placeholder-note {
    color: var(--text-dim);
    font-size: 13px;
    font-family: var(--font-mono);
    padding: 4px 0;
  }

  .check {
    margin-top: 14px;
    padding: 10px 12px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 13px;
    text-align: center;
  }
  .check.ok {
    background: rgba(111,168,122,0.1);
    color: var(--good);
    border: 1px solid rgba(111,168,122,0.25);
  }
  .check.warn {
    background: rgba(194,80,63,0.1);
    color: var(--danger);
    border: 1px solid rgba(194,80,63,0.25);
  }

  button.reset {
    display: block;
    width: 100%;
    min-height: 44px;
    background: none;
    border: 1px solid var(--panel-line);
    color: var(--text-dim);
    font-family: var(--font-ui);
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button.reset:hover, button.reset:active {
    border-color: var(--amber);
    color: var(--amber-bright);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useMemo } = React;
const PRECISION = 4;
const TOLERANCE = 0.001;

function parseNum(v) {
  if (v === "" || v === null || v === undefined) return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

function fmt(n) {
  if (n === null) return "—";
  return n.toFixed(PRECISION) + " g";
}

function Field({ label, value, onChange, placeholder }) {
  return (
    <div className="field">
      <label>{label}</label>
      <div className="input-row">
        <input
          type="number"
          inputMode="decimal"
          step="any"
          placeholder={placeholder}
          value={value}
          onChange={(e) => onChange(e.target.value)}
        />
        <span className="unit">g</span>
      </div>
    </div>
  );
}

function Readout({ label, value, negative }) {
  return (
    <div className="readout">
      <div className="label">{label}</div>
      <div className={"value" + (negative ? " negative" : "")}>{fmt(value)}</div>
    </div>
  );
}

function App() {
  const [bulk, setBulk] = useState("");
  const [full, setFull] = useState("");
  const [mid, setMid] = useState("");
  const [empty, setEmpty] = useState("");

  const b = parseNum(bulk);
  const j = parseNum(full);
  const s = parseNum(mid);
  const f = parseNum(empty);

  const results = useMemo(() => {
    if (b === null || j === null) return null;
    const tare = j - b;
    const pour1 = s !== null ? j - s : null;
    const pour2 = s !== null && f !== null ? s - f : null;
    const waste = f !== null ? f - tare : null;
    const total = pour1 !== null && pour2 !== null && waste !== null
      ? pour1 + pour2 + waste
      : null;
    const checksOut = total !== null ? Math.abs(total - b) < TOLERANCE : null;
    return { pour1, pour2, waste, checksOut };
  }, [b, j, s, f]);

  function reset() {
    setBulk(""); setFull(""); setMid(""); setEmpty("");
  }

  return (
    <div className="sheet">
      <header>
        <h1>Two Machines One Jar Calculator</h1>
      </header>

      <div className="panel">
        <Field label="Bulk Weight:" value={bulk} onChange={setBulk} placeholder="0.0000" />
        <Field label="Jar + Spatula Weight (Full)" value={full} onChange={setFull} placeholder="0.0000" />
        <Field label="Jar + Spatula Weight (Intermediate)" value={mid} onChange={setMid} placeholder="0.0000" />
        <Field label="Jar + Spatula Weight (Empty)" value={empty} onChange={setEmpty} placeholder="0.0000" />
      </div>

      <div className="panel">
        {!results && (
          <div className="placeholder-note">Enter Bulk Weight and Full Jar + Spatula Weight to begin.</div>
        )}
        {results && (
          <React.Fragment>
            <Readout label="Amount in Machine One:" value={results.pour1} negative={results.pour1 !== null && results.pour1 < 0} />
            <Readout label="Amount in Machine Two:" value={results.pour2} negative={results.pour2 !== null && results.pour2 < 0} />
            <Readout label="Jar Waste:" value={results.waste} negative={results.waste !== null && results.waste < 0} />
            {results.checksOut !== null && (
              <div className={"check " + (results.checksOut ? "ok" : "warn")}>
                {results.checksOut ? "✓ math checks out" : "⚠ math does not check out"}
              </div>
            )}
          </React.Fragment>
        )}
      </div>

      <button className="reset" onClick={reset}>Clear all fields</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
